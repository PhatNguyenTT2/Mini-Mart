name: Deploy Customer Web

on:
  push:
    branches:
      - main
    paths:
      - 'customer/**'

jobs:
  build-and-verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./customer

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./customer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build project
        run: npm run build
        
      # Vercel integration automatically deploys on push to main
      # This pipeline ensures code quality before Vercel builds it
